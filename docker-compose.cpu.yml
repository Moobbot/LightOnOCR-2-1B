# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.cpu.yml — LightOnOCR-2-1B (CPU — standalone)
#
# Dùng file này khi máy KHÔNG có GPU NVIDIA.
# File này HOÀN CHỈNH, không cần docker-compose.yml làm base.
#
# Cách khởi động:
#   docker compose -f docker-compose.cpu.yml up -d --build         # API server
#   docker compose -f docker-compose.cpu.yml --profile demo up -d  # Gradio UI
#   docker compose -f docker-compose.cpu.yml \
#     --input /data --output-name result                            # Batch CLI
#
# ⚠️ Yêu cầu tài nguyên (CPU mode):
#   - Model tải vào RAM: ~4.5 GB (float32).
#   - RAM khi inference (OCR): ~6-7 GB (attention buffers + output tokens).
#   - Docker Desktop PHẢI được cấp ≥ 8 GB RAM:
#       Docker Desktop → Settings → Resources → Memory → 8 GB → Apply & Restart
#   - Thời gian load model: ~30–60 giây. OCR mỗi ảnh: ~60–120 giây.
#
# ✅ Có GPU? Dùng file mặc định:
#   docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

name: lightonocr

# ── Anchor biến môi trường CPU ────────────────────────────────────────────────
x-cpu-env: &cpu-env
  MODEL_PATH: /app/model
  LIGHTONOCR_DEVICE: cpu
  LIGHTONOCR_DTYPE: float32
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  PYTORCH_ENABLE_MPS_FALLBACK: "1"

# ── Anchor build chung ────────────────────────────────────────────────────────
x-build: &build
  build:
    context: .
    dockerfile: docker/Dockerfile
  image: lightonocr:latest

services:

  # ── FastAPI REST Server ───────────────────────────────────────────────────
  api:
    <<: *build
    container_name: lightonocr-api
    ports:
      - "${API_PORT:-7861}:7861"
    volumes:
      - .:/app/model:ro
      - ./outputs:/app/outputs
    environment:
      <<: *cpu-env
      API_HOST: 0.0.0.0
      API_PORT: "7861"
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7861/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # CPU load model lâu hơn GPU
    restart: unless-stopped
    command: ["python", "api.py"]

  # ── Web Demo (Gradio) ─────────────────────────────────────────────────────
  demo:
    <<: *build
    container_name: lightonocr-demo
    ports:
      - "7860:7860"
    volumes:
      - .:/app/model:ro
      - ./outputs:/app/outputs
    environment:
      <<: *cpu-env
      GRADIO_HOST: "0.0.0.0"
      GRADIO_PORT: "7860"
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    profiles:
      - demo
    command: ["python", "demo.py"]

  # ── Batch CLI ─────────────────────────────────────────────────────────────
  batch:
    <<: *build
    container_name: lightonocr-batch
    volumes:
      - .:/app/model:ro
      - ./datasets:/data:ro
      - ./outputs:/app/outputs
    environment:
      <<: *cpu-env
    profiles:
      - batch
    entrypoint: ["python", "run.py"]
    command: ["--input", "/data", "--output-dir", "/app/outputs"]
