# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — LightOnOCR-2-1B (GPU — mặc định)
#
# Yêu cầu: nvidia-container-toolkit đã cài trên host.
# https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# Cách khởi động:
#   docker compose up -d --build                # API server (GPU)
#   docker compose --profile demo up -d demo    # Gradio UI (GPU)
#   docker compose --profile batch run --rm batch \
#     --input /data --output-name result        # Batch CLI (GPU)
#
# ❌ Không có GPU? Dùng file CPU thay thế:
#   docker compose -f docker-compose.cpu.yml up -d --build
#
# Biến môi trường (override trong .env):
#   LIGHTONOCR_DEVICE : auto | gpu | cpu  (mặc định: auto)
#   LIGHTONOCR_DTYPE  : auto | bfloat16 | float32  (mặc định: auto)
#   LOG_LEVEL         : DEBUG | INFO | WARNING | ERROR  (mặc định: INFO)
# ─────────────────────────────────────────────────────────────────────────────

name: lightonocr

# ── Anchor chung cho GPU deploy ───────────────────────────────────────────────
x-gpu-deploy: &gpu-deploy
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

# ── Anchor biến môi trường chung ─────────────────────────────────────────────
x-common-env: &common-env
  LIGHTONOCR_DEVICE: ${LIGHTONOCR_DEVICE:-auto}
  LIGHTONOCR_DTYPE: ${LIGHTONOCR_DTYPE:-auto}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  PYTORCH_ENABLE_MPS_FALLBACK: "1"

services:

  # ── FastAPI REST Server ───────────────────────────────────────────────────
  # Endpoint chính — http://localhost:7861/extract
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: lightonocr:latest
    container_name: lightonocr-api
    ports:
      - "${API_PORT:-7861}:7861"
    volumes:
      - model_data:/app/model
      - ./outputs:/app/outputs    
    environment:
      <<: *common-env
      MODEL_PATH: /app/model
      API_HOST: 0.0.0.0
      API_PORT: "7861"
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
    <<: *gpu-deploy
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7861/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    command: ["python", "api.py"]

  # ── Web Demo (Gradio) ─────────────────────────────────────────────────────
  # Chỉ khởi động với: docker compose --profile demo up -d demo
  demo:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: lightonocr:latest
    container_name: lightonocr-demo
    ports:
      - "7860:7860"
    volumes:
      - model_data:/app/model
      - ./outputs:/app/outputs    
    environment:
      <<: *common-env
      MODEL_PATH: /app/model
      GRADIO_HOST: "0.0.0.0"
      GRADIO_PORT: "7860"
    <<: *gpu-deploy
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    profiles:
      - demo
    command: ["python", "demo.py"]

  # ── Batch CLI ─────────────────────────────────────────────────────────────
  # Chạy: docker compose --profile batch run --rm batch \
  #         --input /data --output-name result
  batch:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: lightonocr:latest
    container_name: lightonocr-batch
    volumes:
      - model_data:/app/model
      - ./datasets:/data:ro
      - ./outputs:/app/outputs
    environment:
      <<: *common-env
      MODEL_PATH: /app/model
    <<: *gpu-deploy
    profiles:
      - batch
    entrypoint: ["python", "run.py"]
    command: ["--input", "/data", "--output-dir", "/app/outputs"]
volumes:
  model_data: