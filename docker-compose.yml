# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — LightOnOCR-2-1B
#
# Services:
#   api    — FastAPI REST server (chạy api.py)
#   demo   — Gradio web UI (tùy chọn)
#   batch  — CLI batch processor (chạy bằng profile)
#
# Khởi động:
#   docker compose up api            # REST API server (port 7861)
#   docker compose up demo           # Web UI (port 7860)
#   docker compose run batch --input /data --output-dir /outputs
# ─────────────────────────────────────────────────────────────────────────────

name: lightonocr

services:

  # ── FastAPI REST Server ───────────────────────────────────────────────────
  # Này là endpoint chính để extract-pdf gọi tới qua local_http
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: lightonocr:latest
    container_name: lightonocr-api
    ports:
      - "7861:7861"
    volumes:
      # Model weights (read-only)
      - .:/weights:ro
      # Kết quả xuất ra host
      - ./outputs:/app/outputs
    environment:
      MODEL_PATH: /weights
      PYTORCH_ENABLE_MPS_FALLBACK: "1"
      API_HOST: 0.0.0.0
      API_PORT: "7861"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://127.0.0.1:7861/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # chờ model load xong
    command: [ "python", "api.py" ]

  # ── Web Demo (Gradio) ─────────────────────────────────────────────────────
  # Tùy chọn — khởi động: docker compose --profile demo up demo
  demo:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: lightonocr:latest
    container_name: lightonocr-demo
    ports:
      - "7861:7860"
    volumes:
      # Model weights (read-only)
      - .:/weights:ro
      # Kết quả xuất ra host
      - ./outputs:/app/outputs
    environment:
      MODEL_PATH: /weights
      GRADIO_HOST: "0.0.0.0"
      GRADIO_PORT: "7860"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://127.0.0.1:7860/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - demo
    command: [ "python", "demo.py" ]

  # ── Batch CLI ─────────────────────────────────────────────────────────────
  # Chạy: docker compose --profile batch run batch --input /data --output-name result
  batch:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: lightonocr:latest
    container_name: lightonocr-batch
    volumes:
      # Model weights (read-only)
      - .:/weights:ro
      # Input data
      - ./datasets:/data:ro
      # Output
      - ./outputs:/app/outputs
    environment:
      MODEL_PATH: /weights
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    entrypoint: [ "python", "run.py" ]
    command: [ "--input", "/data", "--output-dir", "/app/outputs" ]
    profiles:
      - batch
